name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package and development tools
        run: python -m pip install -e ".[dev]"

      - name: Run tests
        run: pytest -q

      - name: Run lint
        run: ruff check .

      - name: Run CLI smoke test
        run: |
          contextual-bandit-info
          contextual-bandit-service \
            --smoke-test \
            --decision-log /tmp/contextual-bandit-decisions.jsonl \
            --feedback-log /tmp/contextual-bandit-feedback.jsonl
